services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: smc-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=smc-elasticsearch
      - cluster.name=smc-observability
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ES_PORT}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - observability
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null"
        ]
      interval: 10s
      timeout: 10s
      retries: 30

  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: smc-elastic-setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    networks:
      - observability
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        curl -fsS -u "elastic:${ELASTIC_PASSWORD}" \
          -H "Content-Type: application/json" \
          -X POST "http://elasticsearch:9200/_security/user/kibana_system/_password" \
          -d "{\"password\":\"${KIBANA_PASSWORD}\"}" >/dev/null
        echo "Elastic built-in users configured"
    restart: "no"

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: smc-kibana
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      - SERVER_NAME=smc-kibana
      - SERVER_HOST=0.0.0.0
      - SERVER_BASEPATH=${KIBANA_BASE_PATH}
      - SERVER_REWRITEBASEPATH=true
      - SERVER_PUBLICBASEURL=${KIBANA_PUBLIC_URL}
      - ELASTICSEARCH_HOSTS=["http://elasticsearch:9200"]
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
    ports:
      - "${KIBANA_PORT}:5601"
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 30

  filebeat:
    image: docker.elastic.co/beats/filebeat:${STACK_VERSION}
    container_name: smc-filebeat
    restart: unless-stopped
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - filebeat_data:/usr/share/filebeat/data
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    networks:
      - observability

networks:
  observability:
    name: smc-observability

volumes:
  elasticsearch_data:
  kibana_data:
  filebeat_data:
