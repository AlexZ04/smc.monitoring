name: Build & Deploy to VPS

on:
  push:
    branches: ["master"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY_NAMESPACE: alexz04
  IMAGE_NAME: smk-monitoring
  CONTAINER_NAME: smk-monitoring
  NETWORK_NAME: smk-monitoring-network
  APP_PORT: 8024

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      has_builds: ${{ steps.matrix.outputs.has_builds }}
      service_names: ${{ steps.matrix.outputs.service_names }}
      deploy_all: ${{ steps.matrix.outputs.deploy_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES="$(git ls-files)"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          has_change() {
            local pattern="$1"
            echo "$CHANGED_FILES" | grep -Eq "$pattern"
          }

          matrix='{"include":[]}'
          has_builds=false
          deploy_all=false
          declare -a services=()

          add_service() {
            local service_name="$1"
            local image_name="$2"
            local context="$3"
            local file="$4"
            local cache_scope="$5"

            item=$(printf '{"service_name":"%s","image_name":"%s","context":"%s","file":"%s","cache_scope":"%s"}' \
              "$service_name" "$image_name" "$context" "$file" "$cache_scope")

            matrix=$(jq -c --argjson item "$item" '.include += [$item]' <<< "$matrix")
            services+=("$service_name")
            has_builds=true
          }

          if has_change '^(\.github/workflows/deploy\.yml|Dockerfile|\.dockerignore)$'; then
            deploy_all=true
          fi

          if has_change '^(src/|build\.gradle|settings\.gradle|gradlew|gradlew\.bat|gradle/|src/main/resources/|Dockerfile|\.dockerignore)'; then
            add_service 'smk-monitoring' 'smk-monitoring' '.' './Dockerfile' 'smk-monitoring'
          fi

          service_names="${services[*]}"

          echo "build_matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_builds=$has_builds" >> "$GITHUB_OUTPUT"
          echo "service_names=$service_names" >> "$GITHUB_OUTPUT"
          echo "deploy_all=$deploy_all" >> "$GITHUB_OUTPUT"

  build_and_push:
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.has_builds == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect_changes.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image_name }}:latest
            ghcr.io/${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: false
          sbom: false

  deploy:
    runs-on: ubuntu-latest
    needs: [detect_changes, build_and_push]
    if: always() && needs.detect_changes.result == 'success' && (needs.build_and_push.result == 'success' || needs.build_and_push.result == 'skipped')
    steps:
      - name: Setup SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy updated services
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SERVICE_NAMES: ${{ needs.detect_changes.outputs.service_names }}
          DEPLOY_ALL: ${{ needs.detect_changes.outputs.deploy_all }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          NETWORK_NAME: ${{ env.NETWORK_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          REGISTRY_NAMESPACE: ${{ env.REGISTRY_NAMESPACE }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" <<EOF
            set -e
            flock -n /tmp/deploy.lock bash -lc '
              set -e

              if [ "$DEPLOY_ALL" != "true" ] && [ -z "$SERVICE_NAMES" ]; then
                echo "No application changes detected. Skipping deploy."
                exit 0
              fi

              if [ ! -f /home/deploy/smk-monitoring/.env ]; then
                echo "Missing /home/deploy/smk-monitoring/.env"
                exit 1
              fi

              docker pull ghcr.io/$REGISTRY_NAMESPACE/$IMAGE_NAME:latest

              docker network inspect $NETWORK_NAME >/dev/null 2>&1 || docker network create $NETWORK_NAME

              docker rm -f $CONTAINER_NAME || true

              docker run -d \
                --name $CONTAINER_NAME \
                --restart unless-stopped \
                --network $NETWORK_NAME \
                --env-file /home/deploy/smk-monitoring/.env \
                -p $APP_PORT:$APP_PORT \
                ghcr.io/$REGISTRY_NAMESPACE/$IMAGE_NAME:latest
            '
          EOF
